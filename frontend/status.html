<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务状态 · WebMD</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .status-page { max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    .status-page h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
    .status-task-id { font-family: var(--font-mono); color: var(--color-primary); }
    .status-card { background: #fff; border: 1px solid var(--color-border); border-radius: 8px; padding: 1rem 1.25rem; margin-top: 1rem; line-height: 1.7; }
    .status-hint { color: var(--color-text-secondary); font-size: 0.9rem; margin: 0.75rem 0; }
    .status-meta { font-size: 0.8125rem; color: #888; margin-top: 1rem; }
    .status-empty { text-align: center; color: #666; padding: 2rem 0; }
    .status-analysis { background: #f5f7fa; border: 1px solid #e8ecf0; border-radius: 6px; padding: 10px 12px; font-size: 0.75rem; white-space: pre-wrap; margin-top: 8px; max-height: 240px; overflow: auto; }
    .status-support { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e8ecf0; font-size: 0.8125rem; color: #666; text-align: center; }
    .status-pep-box { margin: 1rem 0 0.5rem; padding: 0.85rem 0 0; border-top: 1px solid #e8ecf0; }
    .status-pep-box label { display: block; font-size: 0.875rem; margin-bottom: 0.35rem; }
    .status-pep-box input { width: 100%; box-sizing: border-box; padding: 0.5rem 0.65rem; border: 1px solid var(--color-border); border-radius: 6px; font-size: 1rem; letter-spacing: 0.04em; }
    .status-pep-actions { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .status-pep-error { color: #b91c1c; font-size: 0.875rem; margin: 0.5rem 0 0; min-height: 1.2em; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="/">
        <img src="/assets/images/logo.png" alt="" class="site-brand-logo" width="32" height="32">
        WebMD
      </a>
      <nav class="site-nav" aria-label="主功能">
        <a class="site-nav-link" href="/#prepare">体系准备</a>
        <a class="site-nav-link" href="/jobs.html">我的任务</a>
      </nav>
      <div class="site-auth" id="auth-guest">
        <button type="button" class="btn btn-sm btn-secondary" id="btn-login">登录</button>
        <button type="button" class="btn btn-sm btn-primary" id="btn-register">注册</button>
      </div>
      <div class="site-auth hidden" id="auth-user-bar">
        <a href="/jobs.html" class="btn btn-sm btn-secondary" id="btn-my-jobs">我的任务</a>
        <span class="site-auth-email" id="auth-user-email"></span>
        <button type="button" class="btn btn-sm btn-secondary" id="btn-logout">退出</button>
      </div>
    </div>
  </header>

  <div id="auth-modal" class="payment-modal hidden" role="dialog" aria-modal="true">
    <div class="payment-modal-backdrop" id="auth-modal-backdrop"></div>
    <div class="payment-modal-panel auth-modal-panel">
      <button type="button" class="payment-modal-close" id="auth-modal-close" aria-label="关闭">×</button>
      <h3 id="auth-modal-title">登录</h3>
      <label class="auth-label" for="auth-email">邮箱</label>
      <input type="email" id="auth-email" class="payment-payer-note" autocomplete="username">
      <label class="auth-label" for="auth-password">密码</label>
      <input type="password" id="auth-password" class="payment-payer-note" autocomplete="current-password">
      <div id="auth-code-row" class="auth-code-row hidden">
        <label class="auth-label" for="auth-code">邮箱验证码</label>
        <div class="auth-code-inputs">
          <input type="text" id="auth-code" class="payment-payer-note" maxlength="6" placeholder="6 位数字" inputmode="numeric" autocomplete="one-time-code">
          <button type="button" class="btn btn-secondary" id="btn-send-code">获取验证码</button>
        </div>
        <p class="auth-code-hint">验证码将发送至您的邮箱，10 分钟内有效</p>
      </div>
      <p class="auth-switch">没有账号？<a href="#" id="auth-switch-register">注册</a> · 已有账号？<a href="#" id="auth-switch-login">登录</a></p>
      <div class="payment-modal-actions">
        <button type="button" class="btn btn-primary" id="auth-submit">登录</button>
        <button type="button" class="btn btn-secondary" id="auth-cancel">取消</button>
      </div>
      <p class="payment-error hidden" id="auth-error"></p>
    </div>
  </div>

  <div class="status-page">
    <h1>任务状态</h1>
    <p>Job ID：<code class="status-task-id" id="status-task-id"></code></p>
    <p class="hint">保存提交时的二维码，可随时扫码查看进度；登录后可在本页直接确认肽序列，也可在<a href="/jobs.html">我的任务</a>中查看全部 Job ID。</p>
    <div id="status-content"><p class="status-empty">加载中…</p></div>
    <p style="margin-top:1.5rem;font-size:0.875rem;"><a href="/jobs.html">我的任务</a> · <a href="/">返回 WebMD 首页</a></p>
    <div class="status-support">
      <p>售后服务 · 微信 <strong>biomd777</strong> · 有任何问题欢迎联系</p>
    </div>
  </div>
  <script src="/js/auth.js?v=20260716j"></script>
  <script src="/js/status.js?v=20260720c"></script>
</body>
</html>
